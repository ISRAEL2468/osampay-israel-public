<!-- SPLASH SCREEN -->
<div id="screen-splash" class="screen active bg-[#00b073] flex items-center justify-center text-white p-6 relative">
  <div class="flex flex-col items-center justify-center flex-1">
    <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-lg mb-4">
      <!-- OPay Native Logo Symbol -->
      <svg class="w-16 h-16 text-[#00b073]" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="14">
        <circle cx="50" cy="50" r="32" stroke="#00b073" stroke-width="12" />
        <rect x="30" y="44" width="20" height="12" fill="#1e293b" stroke="none" rx="2" />
        <circle cx="62" cy="50" r="6" fill="#00b073" stroke="none" />
      </svg>
    </div>
    <h1 class="text-2xl font-extrabold tracking-wide text-white mt-4">OPay</h1>
    <p class="text-xs opacity-90 tracking-widest uppercase mt-1">Beyond Banking</p>
  </div>
  <div class="absolute bottom-10 flex flex-col items-center">
    <div class="flex items-center space-x-2 text-[10px] opacity-75 mb-1 text-white">
      <span class="w-4 h-4 bg-transparent border border-white rounded-full flex items-center justify-center text-[8px] font-bold">c</span>
      <span>Licensed by the CBN and insured by the NDIC</span>
    </div>
  </div>
</div>

<!-- NATIVE LOCK SCREEN / LOGIN -->
<div id="screen-login" class="screen bg-white flex flex-col justify-between p-6">
  <!-- Top Bar -->
  <div class="flex justify-between items-center">
    <span class="text-sm font-semibold text-gray-400 cursor-pointer" onclick="changeScreen('register')">Register</span>
    <span class="text-lg cursor-pointer">🎧</span>
  </div>

  <!-- Main Body -->
  <div class="flex flex-col items-center my-auto space-y-6">
    <!-- User Avatar -->
    <div class="w-20 h-20 rounded-full bg-emerald-50 border border-emerald-100 flex items-center justify-center text-[#00b073] text-2xl font-black shadow-sm">
      IO
    </div>
    <div class="text-center space-y-1">
      <h2 id="login-welcome-title" class="text-lg font-extrabold text-gray-800">Welcome back, ISRAEL</h2>
      <p class="text-xs text-gray-400 font-medium">Enter your 4-digit lock screen PIN to unlock</p>
    </div>

    <!-- PIN dots -->
    <div class="flex justify-center space-x-4 py-2">
      <div id="login-dot-1" class="w-3.5 h-3.5 rounded-full border-2 border-gray-200 transition-all duration-150"></div>
      <div id="login-dot-2" class="w-3.5 h-3.5 rounded-full border-2 border-gray-200 transition-all duration-150"></div>
      <div id="login-dot-3" class="w-3.5 h-3.5 rounded-full border-2 border-gray-200 transition-all duration-150"></div>
      <div id="login-dot-4" class="w-3.5 h-3.5 rounded-full border-2 border-gray-200 transition-all duration-150"></div>
    </div>
  </div>

  <!-- Bottom Keypad -->
  <div class="space-y-4">
    <div class="grid grid-cols-3 gap-y-3 gap-x-6 text-center">
      <button onclick="typeLoginDigit('1')" class="py-3.5 text-xl font-extrabold text-gray-800 rounded-full hover:bg-gray-50 active:bg-gray-100 transition">1</button>
      <button onclick="typeLoginDigit('2')" class="py-3.5 text-xl font-extrabold text-gray-800 rounded-full hover:bg-gray-50 active:bg-gray-100 transition">2</button>
      <button onclick="typeLoginDigit('3')" class="py-3.5 text-xl font-extrabold text-gray-800 rounded-full hover:bg-gray-50 active:bg-gray-100 transition">3</button>
      <button onclick="typeLoginDigit('4')" class="py-3.5 text-xl font-extrabold text-gray-800 rounded-full hover:bg-gray-50 active:bg-gray-100 transition">4</button>
      <button onclick="typeLoginDigit('5')" class="py-3.5 text-xl font-extrabold text-gray-800 rounded-full hover:bg-gray-50 active:bg-gray-100 transition">5</button>
      <button onclick="typeLoginDigit('6')" class="py-3.5 text-xl font-extrabold text-gray-800 rounded-full hover:bg-gray-50 active:bg-gray-100 transition">6</button>
      <button onclick="typeLoginDigit('7')" class="py-3.5 text-xl font-extrabold text-gray-800 rounded-full hover:bg-gray-50 active:bg-gray-100 transition">7</button>
      <button onclick="typeLoginDigit('8')" class="py-3.5 text-xl font-extrabold text-gray-800 rounded-full hover:bg-gray-50 active:bg-gray-100 transition">8</button>
      <button onclick="typeLoginDigit('9')" class="py-3.5 text-xl font-extrabold text-gray-800 rounded-full hover:bg-gray-50 active:bg-gray-100 transition">9</button>
      <div class="flex items-center justify-center text-xs font-semibold text-[#00b073] cursor-pointer" onclick="handleForgotPassword()">Forgot PIN?</div>
      <button onclick="typeLoginDigit('0')" class="py-3.5 text-xl font-extrabold text-gray-800 rounded-full hover:bg-gray-50 active:bg-gray-100 transition">0</button>
      <button onclick="deleteLoginDigit()" class="py-3.5 text-lg font-extrabold text-gray-500 rounded-full hover:bg-gray-50 active:bg-gray-100 transition">⌫</button>
    </div>
  </div>
</div>
