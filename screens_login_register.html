<!-- LOGIN SCREEN -->
<div id="screen-login" class="screen bg-white p-6 justify-between">
  <div>
    <div class="flex items-center mt-2 mb-6">
      <button onclick="changeScreen('logged-out')" class="text-xl text-gray-700 font-bold">&larr;</button>
    </div>
    <div class="flex flex-col items-center mb-8">
      <div class="flex items-center space-x-2 text-emerald-500 font-extrabold text-3xl">
        <svg class="w-12 h-12 text-[#00b073]" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="14">
          <circle cx="50" cy="50" r="32" stroke="#00c282" />
          <rect x="25" y="44" width="22" height="12" fill="#1e293b" stroke="none" rx="2" />
        </svg>
        <span class="text-[#1e293b] font-bold text-4xl">OPay</span>
      </div>
    </div>
    <div class="space-y-4">
      <div>
        <input id="login-phone" type="tel" placeholder="Enter your Mobile No./Email" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-[#00b073] text-sm">
      </div>
      <div>
        <input id="login-password" type="password" placeholder="Enter 6-digit Password" maxlength="6" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-[#00b073] text-sm">
      </div>
      <div class="text-right">
        <span class="text-xs text-[#00b073] font-semibold cursor-pointer">Forgot Password?</span>
      </div>
      <div class="pt-4">
        <button onclick="handleLoginSubmit()" class="w-full py-3 bg-[#00b073] text-white font-bold rounded-full shadow hover:bg-emerald-600 transition">Log in</button>
      </div>
    </div>
  </div>
  <div class="text-center pb-4 text-xs text-gray-500">
    Don't have an OPay Account yet? <span onclick="changeScreen('register')" class="text-[#00b073] font-bold cursor-pointer">Click here to get one</span>
  </div>
</div>

<!-- REGISTER SCREEN -->
<div id="screen-register" class="screen bg-white p-6 justify-between overflow-y-auto no-scrollbar">
  <div>
    <div class="flex items-center mt-2 mb-4">
      <button onclick="changeScreen('login')" class="text-xl text-gray-700 font-bold">&larr;</button>
    </div>
    <h2 class="text-2xl font-extrabold text-gray-900 text-center mb-6">Get an OPay Account</h2>
    <div class="space-y-4">
      <!-- Phone Input -->
      <div class="relative">
        <div class="flex items-center border border-gray-200 rounded-xl overflow-hidden focus-within:border-[#00b073]">
          <div class="flex items-center space-x-1 px-3 py-3 bg-gray-50 border-r border-gray-200 text-sm font-semibold text-gray-700">
            <span>🇳🇬</span><span>+234</span>
          </div>
          <input id="reg-phone" type="tel" placeholder="9162114195" class="flex-1 px-3 py-3 text-sm focus:outline-none">
        </div>
        <span class="text-[10px] text-gray-400 absolute right-3 top-3.5">10 digits</span>
      </div>

      <!-- Live API Lookup Box -->
      <div id="reg-api-lookup" class="hidden p-3 rounded-xl border transition-all text-xs font-semibold">
        <!-- Will be updated dynamically -->
      </div>

      <!-- Other Details (Initially hidden until valid phone lookup) -->
      <div id="reg-details-group" class="space-y-4">
        <div>
          <input id="reg-email" type="email" placeholder="Enter Your Email" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-[#00b073] text-sm">
        </div>
        <div class="relative">
          <input id="reg-password" type="password" placeholder="Enter Password (6 digits)" maxlength="6" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-[#00b073] text-sm">
          <span class="text-[10px] text-gray-400 absolute right-3 top-4">6 digits</span>
        </div>
        <div class="relative">
          <input id="reg-pin" type="password" placeholder="Set Payment PIN (4 digits)" maxlength="4" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-[#00b073] text-sm">
          <span class="text-[10px] text-gray-400 absolute right-3 top-4">4 digits</span>
        </div>
      </div>

      <div class="pt-4">
        <button id="reg-submit-btn" onclick="handleRegisterSubmit()" class="w-full py-3 bg-[#00b073] text-white font-bold rounded-full shadow hover:bg-emerald-600 transition disabled:opacity-50" disabled>Sign Up</button>
      </div>
    </div>
  </div>
  <div class="text-center pt-6 pb-2 text-xs text-gray-500 flex flex-col items-center">
    <span class="mb-4">Already Have an OPay Account? <span onclick="changeScreen('login')" class="text-[#00b073] font-bold cursor-pointer">Log in</span></span>
    <div class="flex items-center space-x-1 text-[10px] opacity-75">
      <span class="w-3.5 h-3.5 border border-gray-400 rounded-full flex items-center justify-center text-[8px] font-bold">c</span>
      <span>Licensed by the CBN and insured by the NDIC</span>
    </div>
  </div>
</div>
