<!-- REGISTRATION SCREEN -->
<div id="screen-register" class="screen bg-white flex flex-col justify-between p-6">
  <!-- Top Bar -->
  <div class="flex items-center space-x-4">
    <button onclick="changeScreen('login')" class="text-xl text-gray-700 font-bold">&larr;</button>
    <h3 class="text-lg font-extrabold text-gray-800">Register New Account</h3>
  </div>

  <!-- Form -->
  <div class="flex-1 overflow-y-auto no-scrollbar py-6 space-y-4">
    <p class="text-xs text-gray-400 font-medium leading-relaxed">Join millions of users transacting daily with OPay. Set up your details securely below.</p>
    
    <div>
      <label class="text-xs font-bold text-gray-500 block mb-1">Phone Number (10 digits)</label>
      <input id="reg-phone" type="tel" placeholder="e.g. 7047945145" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-[#00b073] text-sm font-semibold text-gray-800">
      <div id="reg-api-lookup" class="hidden mt-2"></div>
    </div>

    <div>
      <label class="text-xs font-bold text-gray-500 block mb-1">Email Address</label>
      <input id="reg-email" type="email" placeholder="israel@opay.com" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-[#00b073] text-sm font-semibold text-gray-800">
    </div>

    <div>
      <label class="text-xs font-bold text-gray-500 block mb-1">Password</label>
      <input id="reg-password" type="password" placeholder="Min 6 characters" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-[#00b073] text-sm font-semibold text-gray-800">
    </div>

    <div>
      <label class="text-xs font-bold text-gray-500 block mb-1">Choose Lock/Payment PIN (4 Digits)</label>
      <input id="reg-pin" type="tel" maxlength="4" placeholder="e.g. 1234" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-[#00b073] text-sm font-semibold text-gray-800">
    </div>
  </div>

  <!-- Submit -->
  <div>
    <button id="reg-submit-btn" onclick="handleRegisterSubmit()" class="w-full py-3.5 bg-[#00b073] text-white font-bold rounded-full shadow hover:bg-emerald-600 transition disabled:opacity-40" disabled>Create Account</button>
  </div>
</div>
