<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OPay - Beyond Banking</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .screen {
      display: none;
      height: 100%;
      flex-direction: column;
    }
    .screen.active {
      display: flex;
    }
    /* Smooth Transitions for Drawers and Overlays */
    .drawer {
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .drawer-hidden {
      transform: translateY(100%);
    }
    .drawer-visible {
      transform: translateY(0);
    }
    /* Overlay Backdrop */
    .backdrop {
      transition: opacity 0.3s ease;
    }
    /* Custom Keypad styles */
    .keypad-btn:active {
      background-color: #e5e7eb;
    }
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
    /* Torn Edge Receipt */
    .torn-edge {
      position: relative;
      background: white;
    }
    .torn-edge-top::before {
      content: "";
      display: block;
      position: absolute;
      top: -6px;
      left: 0;
      width: 100%;
      height: 6px;
      background-image: linear-gradient(135deg, #ffffff 25%, transparent 25%), linear-gradient(225deg, #ffffff 25%, transparent 25%);
      background-size: 10px 10px;
      background-position: 0 0;
    }
    .torn-edge-bottom::after {
      content: "";
      display: block;
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 100%;
      height: 6px;
      background-image: linear-gradient(45deg, #ffffff 25%, transparent 25%), linear-gradient(315deg, #ffffff 25%, transparent 25%);
      background-size: 10px 10px;
      background-position: 0 0;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-0 sm:p-4">
  <!-- Mobile Device Container -->
  <div class="w-full max-w-md bg-white min-h-screen sm:min-h-[844px] sm:max-h-[844px] sm:rounded-[40px] sm:shadow-2xl overflow-hidden relative flex flex-col border border-gray-200">
