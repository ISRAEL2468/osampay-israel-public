<!-- TRANSFER SLIDING BOTTOM SHEET DRAWER -->
<div id="drawer-transfer" class="drawer drawer-hidden fixed inset-0 bg-black bg-opacity-50 z-40 flex flex-col justify-end hidden">
  <!-- Clickable Backdrop to close -->
  <div class="absolute inset-0 z-0" onclick="closeTransferDrawer()"></div>
  
  <!-- Drawer Panel Container -->
  <div class="bg-gray-50 rounded-t-[32px] h-[85%] max-w-md w-full mx-auto relative z-10 flex flex-col overflow-hidden shadow-2xl border-t border-gray-100">
    
    <!-- Drawer Grab Indicator & Header -->
    <div class="bg-white p-4 flex items-center justify-between border-b border-gray-100">
      <button onclick="closeTransferDrawer()" class="text-xs font-bold text-[#00b073] bg-emerald-50 px-3.5 py-1.5 rounded-full hover:bg-emerald-100 transition">✕ Close</button>
      <h3 class="text-sm font-black text-gray-800">Transfer To Bank</h3>
      <span onclick="switchTab('history'); closeTransferDrawer();" class="text-xs font-bold text-[#00b073] cursor-pointer hover:underline">History</span>
    </div>

    <!-- Lavender Free Transfer Banner -->
    <div class="bg-indigo-50 px-4 py-2.5 flex items-center space-x-2 text-indigo-600 text-[10px] font-bold border-b border-indigo-100">
      <span>⚡</span>
      <span>Daily promotion: Enjoy 3 entirely free transfers today</span>
    </div>

    <!-- Scrollable Form Section -->
    <div class="flex-1 overflow-y-auto no-scrollbar p-4 space-y-4">
      
      <!-- Input Card -->
      <div class="bg-white p-4 rounded-2xl shadow-sm space-y-4">
        <div>
          <label class="text-[10px] font-black text-gray-400 block mb-1 uppercase tracking-wider">Recipient Account</label>
          <input id="transfer-acc-no" type="tel" maxlength="10" placeholder="Enter 10-Digit Account Number" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-[#00b073] text-sm font-bold text-gray-800 tracking-wide bg-gray-50 focus:bg-white transition-all">
        </div>
        
        <!-- Bank Selector Row -->
        <div>
          <label class="text-[10px] font-black text-gray-400 block mb-1 uppercase tracking-wider">Destination Bank</label>
          <div onclick="openBankModal()" class="border border-gray-200 rounded-xl p-3 flex items-center justify-between cursor-pointer hover:bg-gray-50 bg-gray-50 hover:border-emerald-200 transition-all">
            <div class="flex items-center space-x-3">
              <div id="selected-bank-logo" class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center font-extrabold text-xs text-gray-500">?</div>
              <span id="selected-bank-name" class="text-xs font-black text-gray-700">Select Bank</span>
            </div>
            <span class="text-gray-400 font-bold text-xs">&gt;</span>
          </div>
        </div>

        <!-- Live Name Resolution green box -->
        <div id="transfer-resolve-box" class="hidden p-3 rounded-xl border flex items-center space-x-2 text-xs font-black">
          <!-- Will be loaded dynamically -->
        </div>

        <!-- Amount and Remark (Now inline on the same transfer drawer!) -->
        <div id="transfer-amount-card" class="space-y-3 pt-2 border-t border-gray-50 hidden">
          <div>
            <label class="text-[10px] font-black text-gray-400 block mb-1 uppercase tracking-wider">Transfer Amount</label>
            <div class="flex items-center space-x-1 border-b-2 border-gray-100 focus-within:border-[#00b073] pb-2">
              <span class="text-xl font-black text-gray-800">₦</span>
              <input id="transfer-amount" type="number" placeholder="100.00-5,000,000.00" oninput="checkAmountInput()" class="flex-1 text-xl font-black text-gray-800 focus:outline-none bg-transparent">
            </div>
            <!-- Quick select grids -->
            <div class="grid grid-cols-4 gap-1.5 pt-2">
              <button onclick="setQuickAmount(1000)" class="py-1.5 border border-gray-100 rounded-lg text-[10px] font-bold text-gray-600 bg-gray-50 hover:bg-gray-100 transition">₦1k</button>
              <button onclick="setQuickAmount(5000)" class="py-1.5 border border-gray-100 rounded-lg text-[10px] font-bold text-gray-600 bg-gray-50 hover:bg-gray-100 transition">₦5k</button>
              <button onclick="setQuickAmount(10000)" class="py-1.5 border border-gray-100 rounded-lg text-[10px] font-bold text-gray-600 bg-gray-50 hover:bg-gray-100 transition">₦10k</button>
              <button onclick="setQuickAmount(50000)" class="py-1.5 border border-gray-100 rounded-lg text-[10px] font-bold text-gray-600 bg-gray-50 hover:bg-gray-100 transition">₦50k</button>
            </div>
          </div>

          <div>
            <label class="text-[10px] font-black text-gray-400 block mb-1 uppercase tracking-wider">Payment Remark</label>
            <input id="transfer-remark" type="text" placeholder="Add a note (Optional)" class="w-full text-xs font-bold text-gray-700 focus:outline-none border-b border-gray-100 pb-2 bg-transparent">
          </div>
        </div>

        <button id="transfer-confirm-btn" onclick="openReminderModal()" class="w-full py-3.5 bg-[#00b073] text-white font-extrabold rounded-full shadow hover:bg-emerald-600 transition disabled:opacity-40" disabled>Confirm Transfer</button>
      </div>

      <!-- Bank success monitor -->
      <div class="bg-white p-3 rounded-xl shadow-sm flex items-center justify-between text-[10px] hover:bg-gray-50 cursor-pointer">
        <div class="flex items-center space-x-2 text-gray-600">
          <span class="text-sm">📊</span>
          <span class="font-bold">Real-time Bank Network Health Monitor</span>
        </div>
        <span class="text-gray-400 font-bold">&gt;</span>
      </div>

      <!-- Recents Section -->
      <div class="space-y-2">
        <h4 class="text-xs font-black text-gray-400 uppercase tracking-wider">Recent Recipients</h4>
        <div class="grid grid-cols-1 gap-2" id="recents-list-container">
          <!-- Populated dynamically -->
        </div>
      </div>

    </div>
  </div>
</div>
